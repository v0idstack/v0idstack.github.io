---
layout: default
---
<div class="max-w-4xl mx-auto px-4 pt-32 pb-16">
  <a href="/#blogs" class="text-green-400 hover:underline mb-8 inline-block font-mono"><- Back to terminal</a>
  
  <article class="prose prose-invert lg:prose-xl">
    <h1 class="text-4xl md:text-5xl font-bold text-green-400 glow mb-4 font-mono">{{ page.title }}</h1>
    <p class="text-gray-500 mb-12 font-mono">Date: {{ page.date | date: "%Y-%m-%d" }} | Author: 0ctane</p>
    
    <div class="markdown-content text-gray-300 leading-relaxed space-y-6">
      {{ content }}
    </div>
  </article>
</div>

<style>
  /* This makes your Markdown look good */
  .markdown-content h2 { color: #00ff00; font-size: 1.5rem; font-weight: bold; margin-top: 2rem; font-family: monospace; }
  .markdown-content p { margin-bottom: 1.25rem; }
  .markdown-content code { background: #1a1a1a; color: #00ff00; padding: 0.2rem 0.4rem; border-radius: 4px; }
  .markdown-content pre { background: #111; border: 1px solid #333; padding: 1rem; overflow-x: auto; }
</style>
